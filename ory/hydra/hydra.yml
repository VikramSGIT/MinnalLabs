dsn: "${HYDRA_DSN}"

serve:
  public:
    cors:
      enabled: true
      allowed_origins:
        - "${FRONTEND_URL:-http://localhost:3000}"
  admin:
    host: 0.0.0.0
    port: 4445

urls:
  self:
    issuer: "${HYDRA_PUBLIC_URL:-http://localhost:4444/}"
  consent: "${BACKEND_URL:-http://backend:8080}/oauth/consent"
  login: "${BACKEND_URL:-http://backend:8080}/oauth/login"
  logout: "${BACKEND_URL:-http://backend:8080}/oauth/logout"

strategies:
  access_token: opaque

ttl:
  access_token: 1h
  refresh_token: 720h
  authorize_code: 10m

oauth2:
  expose_internal_errors: false

log:
  level: info
  format: json
