version: v1.3.0

serve:
  public:
    cors:
      enabled: true
      allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      allowed_headers:
        - Authorization
        - Content-Type
        - Cookie
        - X-Session-Token
      exposed_headers:
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false
        min_password_length: 8
    code:
      enabled: true
      config:
        lifespan: 15m
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            mapper_url: file:///etc/config/oidc.google.jsonnet
            scope:
              - openid
              - email
              - profile

  flows:
    login:
      lifespan: 10m
    registration:
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: web_hook
              config:
                url: http://backend:8080/internal/hooks/registration
                method: POST
                body: file:///etc/config/registration-hook.jsonnet
                can_interrupt: false
                response:
                  ignore: true
            - hook: show_verification_ui
        oidc:
          hooks:
            - hook: web_hook
              config:
                url: http://backend:8080/internal/hooks/registration
                method: POST
                body: file:///etc/config/registration-hook.jsonnet
                can_interrupt: false
                response:
                  ignore: true
    logout: {}
    verification:
      enabled: true
      use: code
      lifespan: 15m
    settings: {}

session:
  lifespan: 168h
  cookie:
    name: ory_kratos_session
    same_site: Lax

identity:
  default_schema_id: user
  schemas:
    - id: user
      url: file:///etc/config/identity.schema.json

log:
  level: info
  format: json
