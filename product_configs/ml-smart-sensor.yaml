substitutions:
  firmware_version: v0.0.5

esphome:
  name: ml-smart-sensor-v1
  friendly_name: presence sensor
  includes:
    - secure_ble_provisioning.h
  on_boot:
    priority: 200
    then:
      - lambda: |-
          std::string product_name = "ml-smart-sensor-v1";
          id(char_product_type).set_value(std::vector<uint8_t>(product_name.begin(), product_name.end()));
          std::string product_id = "1";
          id(char_product_id).set_value(std::vector<uint8_t>(product_id.begin(), product_id.end()));
          std::string key_error;
          if (!secure_ble::ensure_key_material(id(g_device_private_key_b64), id(g_device_public_key_b64), key_error)) {
            ESP_LOGE("secure_ble", "Failed to initialize device key material: %s", key_error.c_str());
          } else {
            id(char_device_public_key).set_value(secure_ble::public_key_bytes());
            ESP_LOGI("secure_ble", "Secure BLE public key loaded.");
          }
      - if:
          condition:
            lambda: 'return id(g_wifi_ssid).length() > 0;'
          then:
            - logger.log: "Credentials found. Configuring WiFi, deferring MQTT until connected."
            - mqtt.disable:
            - lambda: |-
                auto sta = wifi::WiFiAP();
                sta.set_ssid(id(g_wifi_ssid).c_str());
                sta.set_password(id(g_wifi_password).c_str());
                wifi::global_wifi_component->set_sta(sta);
                ESP_LOGI("prov", "WiFi set to SSID: %s", id(g_wifi_ssid).c_str());
                id(my_mqtt).set_broker_address(id(g_mqtt_url).c_str());
                if (id(g_mqtt_port).length() > 0) {
                  id(my_mqtt).set_broker_port(atoi(id(g_mqtt_port).c_str()));
                }
                if (id(g_mqtt_username).length() > 0) {
                  id(my_mqtt).set_username(id(g_mqtt_username).c_str());
                  id(my_mqtt).set_password(id(g_mqtt_password).c_str());
                }
                std::string topic = id(g_user_id) + "/" + id(g_home_id) + "/" + id(g_device_id);
                id(my_mqtt).set_topic_prefix(topic, topic);
                std::string status_topic = topic + "/status";

                std::string firmware_version = "${firmware_version}";

                mqtt::MQTTMessage birth_message;
                birth_message.topic = status_topic;
                birth_message.payload = std::string("online_") + firmware_version;
                birth_message.qos = 0;
                birth_message.retain = true;
                id(my_mqtt).set_birth_message(std::move(birth_message));

                mqtt::MQTTMessage last_will_message;
                last_will_message.topic = status_topic;
                last_will_message.payload = "offline";
                last_will_message.qos = 0;
                last_will_message.retain = true;
                id(my_mqtt).set_last_will(std::move(last_will_message));

                mqtt::MQTTMessage shutdown_message;
                shutdown_message.topic = status_topic;
                shutdown_message.payload = "offline";
                shutdown_message.qos = 0;
                shutdown_message.retain = true;
                id(my_mqtt).set_shutdown_message(std::move(shutdown_message));
                ESP_LOGI("prov", "MQTT configured: %s:%s, topic: %s", id(g_mqtt_url).c_str(), id(g_mqtt_port).c_str(), topic.c_str());
            - delay: 3s
            - ble.disable:
          else:
            - logger.log: "No credentials found. Disabling WiFi/MQTT, entering Enrollment Mode."
            - wifi.disable:
            - mqtt.disable:
            - script.execute: blink_enrollment_led
      - if:
          condition:
            lambda: 'return id(g_ota_target_version).length() > 0 && id(g_ota_target_version) == "${firmware_version}";'
          then:
            - logger.log:
                format: "Running target firmware %s. Clearing persisted OTA retry state."
                args: ['id(g_ota_target_version).c_str()']
            - script.execute: clear_pending_ota

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

json:

globals:
  - id: g_user_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"provisioning"'
  - id: g_home_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"unassigned"'
  - id: g_device_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"unassigned"'
  - id: g_mqtt_url
    type: std::string
    restore_value: yes
    max_restore_data_length: 128
    initial_value: '"dummy.local"'
  - id: g_mqtt_username
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_mqtt_password
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_mqtt_port
    type: std::string
    restore_value: yes
    max_restore_data_length: 8
    initial_value: '"1883"'
  - id: g_wifi_ssid
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_wifi_password
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_ota_url
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'
  - id: g_ota_md5_url
    type: std::string
    restore_value: yes
    max_restore_data_length: 254
    initial_value: '""'
  - id: g_ota_target_version
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_device_private_key_b64
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_device_public_key_b64
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'

mqtt:
  id: my_mqtt
  broker: ""
  on_connect:
    - lambda: |-
        static bool ota_topic_registered = false;
        if (ota_topic_registered) {
          return;
        }
        std::string ota_topic = id(g_user_id) + "/" + id(g_home_id) + "/" + id(g_device_id) + "/firmware_update";
        id(my_mqtt).subscribe(ota_topic, [=](const std::string &topic, const std::string &payload) {
          if (payload.empty()) {
            ESP_LOGI("ota", "Received empty OTA payload, clearing pending OTA state");
            id(clear_pending_ota).execute();
            return;
          }

          bool parsed = json::parse_json(payload, [=](JsonObject root) -> bool {
            if (!root["version"].is<const char *>() || !root["url"].is<const char *>() || !root["md5_url"].is<const char *>()) {
              ESP_LOGW("ota", "Ignoring OTA command missing version/url/md5_url");
              return false;
            }

            std::string target_version = std::string(root["version"].as<const char *>());
            if (target_version == "${firmware_version}") {
              ESP_LOGI("ota", "Already on firmware %s, ignoring OTA command", target_version.c_str());
              return true;
            }

            id(g_ota_target_version) = target_version;
            id(g_ota_url) = std::string(root["url"].as<const char *>());
            id(g_ota_md5_url) = std::string(root["md5_url"].as<const char *>());
            global_preferences->sync();

            ESP_LOGI("ota", "Queued OTA version %s from %s", id(g_ota_target_version).c_str(), id(g_ota_url).c_str());
            id(run_pending_ota).execute();
            return true;
          });
          if (!parsed) {
            ESP_LOGW("ota", "Ignoring invalid OTA JSON payload");
          }
        });
        ota_topic_registered = true;
        ESP_LOGI("ota", "Subscribed to OTA topic %s", ota_topic.c_str());

http_request:

ota:
  - platform: http_request
    on_error:
      then:
        - logger.log:
            format: "OTA update error %d. Retrying in 1 minute."
            args: ["x"]
        - script.execute: retry_pending_ota

safe_mode:
  on_safe_mode:
    then:
      - if:
          condition:
            lambda: |-
              return id(g_ota_url).length() > 0 &&
                     id(g_ota_md5_url).length() > 0 &&
                     id(g_ota_target_version).length() > 0 &&
                     id(g_ota_target_version) != "${firmware_version}";
          then:
            - logger.log:
                format: "Safe mode entered with pending OTA target %s. Retrying in 1 minute."
                args: ['id(g_ota_target_version).c_str()']
            - delay: 1min
            - ota.http_request.flash:
                url: !lambda 'return id(g_ota_url);'
                md5_url: !lambda 'return id(g_ota_md5_url);'

esp32_ble_server:
  on_connect:
    - logger.log: "Dashboard connected!"
    - script.stop: blink_enrollment_led
    - switch.turn_on: user_led
    - lambda: |-
        if (!id(g_device_public_key_b64).empty()) {
          id(char_device_public_key).set_value(secure_ble::public_key_bytes());
        }
  on_disconnect:
    - switch.turn_off: user_led
    - if:
        condition:
          lambda: 'return id(g_wifi_ssid).length() == 0;'
        then:
          - script.execute: blink_enrollment_led

  services:
    - uuid: "12345678-1234-1234-1234-000000000000"
      characteristics:
        - uuid: "12345678-1234-1234-1234-000000000001"
          id: char_product_type
          read: true

        - uuid: "12345678-1234-1234-1234-00000000000C"
          id: char_product_id
          read: true

        - uuid: "12345678-1234-1234-1234-00000000000D"
          id: char_device_public_key
          read: true

        - uuid: "12345678-1234-1234-1234-00000000000E"
          write: true
          on_write:
            - lambda: |-
                std::string error;
                auto status = secure_ble::ingest_chunk(x, error);
                if (status == secure_ble::ChunkStatus::kComplete) {
                  ESP_LOGI("secure_ble", "Encrypted provisioning bundle received and validated.");
                } else if (status == secure_ble::ChunkStatus::kAccepted) {
                  ESP_LOGI("secure_ble", "Accepted provisioning chunk of %u bytes.", static_cast<unsigned>(x.size()));
                } else {
                  ESP_LOGW("secure_ble", "Rejected provisioning chunk: %s", error.c_str());
                }

        - uuid: "12345678-1234-1234-1234-00000000000B"
          write: true
          on_write:
            - lambda: |-
                std::string apply_error;
                if (!secure_ble::apply_pending_provisioning(
                      id(g_user_id), id(g_home_id), id(g_device_id),
                      id(g_mqtt_url), id(g_mqtt_port), id(g_mqtt_username),
                      id(g_mqtt_password), id(g_wifi_ssid), id(g_wifi_password),
                      apply_error)) {
                  ESP_LOGW("secure_ble", "Restart ignored because provisioning is not ready: %s", apply_error.c_str());
                  return;
                }
                ESP_LOGI("secure_ble", "Secure provisioning applied. Syncing preferences and rebooting.");
                global_preferences->sync();
            - delay: 2s
            - button.press: restart_device

button:
  - platform: restart
    id: restart_device
    name: "Restart"
  - platform: template
    id: factory_reset
    name: "Factory Reset"
    on_press:
      - script.execute: do_factory_reset

binary_sensor:
  - platform: gpio
    pin: { number: 9, inverted: true }
    id: factory_reset_button
    filters: [delayed_on: 5s]
    on_press:
      then:
        - script.execute: do_factory_reset

switch:
  - platform: gpio
    pin: { number: 15, inverted: true }
    id: user_led
    internal: true
  - platform: template
    id: dummy_switch
    name: "Power"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

script:
  - id: run_pending_ota
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(g_ota_url).length() > 0 &&
                     id(g_ota_md5_url).length() > 0 &&
                     id(g_ota_target_version).length() > 0 &&
                     id(g_ota_target_version) != "${firmware_version}";
          then:
            - logger.log:
                format: "Applying OTA version %s from %s"
                args: ['id(g_ota_target_version).c_str()', 'id(g_ota_url).c_str()']
            - ota.http_request.flash:
                url: !lambda 'return id(g_ota_url);'
                md5_url: !lambda 'return id(g_ota_md5_url);'
  - id: retry_pending_ota
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(g_ota_url).length() > 0 &&
                     id(g_ota_md5_url).length() > 0 &&
                     id(g_ota_target_version).length() > 0 &&
                     id(g_ota_target_version) != "${firmware_version}";
          then:
            - delay: 1min
            - script.execute: run_pending_ota
  - id: clear_pending_ota
    mode: restart
    then:
      - globals.set: { id: g_ota_url, value: '""' }
      - globals.set: { id: g_ota_md5_url, value: '""' }
      - globals.set: { id: g_ota_target_version, value: '""' }
      - lambda: 'global_preferences->sync();'
  - id: do_factory_reset
    then:
      - logger.log: "Factory reset triggered! Clearing all provisioning data..."
      - globals.set: { id: g_user_id, value: '"provisioning"' }
      - globals.set: { id: g_home_id, value: '"unassigned"' }
      - globals.set: { id: g_device_id, value: '"unassigned"' }
      - globals.set: { id: g_mqtt_url, value: '"dummy.local"' }
      - globals.set: { id: g_mqtt_username, value: '""' }
      - globals.set: { id: g_mqtt_password, value: '""' }
      - globals.set: { id: g_mqtt_port, value: '"1883"' }
      - globals.set: { id: g_wifi_ssid, value: '""' }
      - globals.set: { id: g_wifi_password, value: '""' }
      - globals.set: { id: g_device_private_key_b64, value: '""' }
      - globals.set: { id: g_device_public_key_b64, value: '""' }
      - script.execute: clear_pending_ota
      - lambda: |-
          secure_ble::clear_runtime_state();
          secure_ble::clear_key_cache();
          global_preferences->sync();
      - delay: 1s
      - button.press: restart_device
  - id: blink_enrollment_led
    mode: restart
    then:
      - while:
          condition: { lambda: 'return true;' }
          then:
            - switch.toggle: user_led
            - delay: 500ms

preferences:
  flash_write_interval: 60s

wifi:
  ssid: "dummy"
  password: ""
  on_connect:
    - logger.log: "WiFi connected. Enabling MQTT."
    - delay: 2s
    - mqtt.enable:
