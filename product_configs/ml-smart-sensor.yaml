substitutions:
  firmware_version: v1.0.1

esphome:
  name: ml-smart-sensor-v1
  friendly_name: presence sensor
  on_boot:
    priority: 200
    then:
      - lambda: |-
          std::string product_name = "ml-smart-sensor-v1";
          id(char_product_type).set_value(std::vector<uint8_t>(product_name.begin(), product_name.end()));
          std::string product_id = "1";
          id(char_product_id).set_value(std::vector<uint8_t>(product_id.begin(), product_id.end()));
      - if:
          condition:
            lambda: 'return id(g_wifi_ssid).length() > 0;'
          then:
            - logger.log: "Credentials found. Configuring WiFi, deferring MQTT until connected."
            - mqtt.disable:
            - lambda: |-
                auto sta = wifi::WiFiAP();
                sta.set_ssid(id(g_wifi_ssid).c_str());
                sta.set_password(id(g_wifi_password).c_str());
                wifi::global_wifi_component->set_sta(sta);
                ESP_LOGI("prov", "WiFi set to SSID: %s", id(g_wifi_ssid).c_str());
                id(my_mqtt).set_broker_address(id(g_mqtt_url).c_str());
                if (id(g_mqtt_port).length() > 0) {
                  id(my_mqtt).set_broker_port(atoi(id(g_mqtt_port).c_str()));
                }
                if (id(g_mqtt_username).length() > 0) {
                  id(my_mqtt).set_username(id(g_mqtt_username).c_str());
                  id(my_mqtt).set_password(id(g_mqtt_password).c_str());
                }
                std::string topic = id(g_user_id) + "/" + id(g_home_id) + "/" + id(g_device_id);
                id(my_mqtt).set_topic_prefix(topic, topic);
                std::string status_topic = topic + "/status";

                std::string firmware_version = "${firmware_version}";

                mqtt::MQTTMessage birth_message;
                birth_message.topic = status_topic;
                birth_message.payload = std::string("online_") + firmware_version;
                birth_message.qos = 0;
                birth_message.retain = true;
                id(my_mqtt).set_birth_message(std::move(birth_message));

                mqtt::MQTTMessage last_will_message;
                last_will_message.topic = status_topic;
                last_will_message.payload = "offline";
                last_will_message.qos = 0;
                last_will_message.retain = true;
                id(my_mqtt).set_last_will(std::move(last_will_message));

                mqtt::MQTTMessage shutdown_message;
                shutdown_message.topic = status_topic;
                shutdown_message.payload = "offline";
                shutdown_message.qos = 0;
                shutdown_message.retain = true;
                id(my_mqtt).set_shutdown_message(std::move(shutdown_message));
                ESP_LOGI("prov", "MQTT configured: %s:%s, topic: %s", id(g_mqtt_url).c_str(), id(g_mqtt_port).c_str(), topic.c_str());
            - delay: 3s
            - ble.disable:
          else:
            - logger.log: "No credentials found. Disabling WiFi/MQTT, entering Enrollment Mode."
            - wifi.disable:
            - mqtt.disable:
            - script.execute: blink_enrollment_led

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

globals:
  - id: g_user_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"provisioning"'
  - id: g_home_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"unassigned"'
  - id: g_device_id
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"unassigned"'
  - id: g_mqtt_url
    type: std::string
    restore_value: yes
    max_restore_data_length: 128
    initial_value: '"dummy.local"'
  - id: g_mqtt_username
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_mqtt_password
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_mqtt_port
    type: std::string
    restore_value: yes
    max_restore_data_length: 8
    initial_value: '"1883"'
  - id: g_wifi_ssid
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_wifi_password
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '""'
  - id: g_ota_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: g_ota_md5
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: g_ota_version
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: g_ota_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ota_topic_subscribed
    type: bool
    restore_value: no
    initial_value: 'false'

mqtt:
  id: my_mqtt
  broker: ""
  on_connect:
    - lambda: |-
        if (id(g_ota_topic_subscribed)) {
          return;
        }
        std::string ota_topic = id(g_user_id) + "/" + id(g_home_id) + "/" + id(g_device_id) + "/ota/command";
        id(my_mqtt).subscribe_json(ota_topic, [=](const std::string &topic, JsonObject root) {
          if (!root.containsKey("version") || !root.containsKey("url") || !root.containsKey("md5")) {
            ESP_LOGW("ota", "Ignoring OTA command missing version/url/md5");
            return;
          }

          std::string target_version = std::string(root["version"].as<const char *>());
          if (target_version == "${firmware_version}") {
            ESP_LOGI("ota", "Already on firmware %s, ignoring OTA command", target_version.c_str());
            return;
          }

          id(g_ota_version) = target_version;
          id(g_ota_url) = std::string(root["url"].as<const char *>());
          id(g_ota_md5) = std::string(root["md5"].as<const char *>());
          id(g_ota_pending) = true;

          ESP_LOGI("ota", "Queued OTA version %s from %s", id(g_ota_version).c_str(), id(g_ota_url).c_str());
          id(run_pending_ota).execute();
        });
        id(g_ota_topic_subscribed) = true;
        ESP_LOGI("ota", "Subscribed to OTA topic %s", ota_topic.c_str());
  on_disconnect:
    - lambda: |-
        id(g_ota_topic_subscribed) = false;

http_request:

ota:
  - platform: http_request

esp32_ble_server:
  on_connect:
    - logger.log: "Dashboard connected!"
    - script.stop: blink_enrollment_led
    - switch.turn_on: user_led
  on_disconnect:
    - switch.turn_off: user_led
    - if:
        condition:
          lambda: 'return id(g_wifi_ssid).length() == 0;'
        then:
          - script.execute: blink_enrollment_led

  services:
    - uuid: "12345678-1234-1234-1234-000000000000"
      characteristics:
        - uuid: "12345678-1234-1234-1234-000000000001"
          id: char_product_type
          read: true

        - uuid: "12345678-1234-1234-1234-00000000000C"
          id: char_product_id
          read: true

        - uuid: "12345678-1234-1234-1234-000000000002"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_user_id: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_user_id
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000003"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_device_id: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_device_id
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000004"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_mqtt_url: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_mqtt_url
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000005"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_wifi_ssid: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_wifi_ssid
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000006"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_wifi_password: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_wifi_password
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000007"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_mqtt_username: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_mqtt_username
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000008"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_mqtt_password: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_mqtt_password
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-000000000009"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_mqtt_port: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_mqtt_port
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-00000000000A"
          write: true
          on_write:
            - logger.log:
                format: "BLE WRITE g_home_id: [%s]"
                args: ['std::string(x.begin(), x.end()).c_str()']
            - globals.set:
                id: g_home_id
                value: !lambda 'return std::string(x.begin(), x.end());'

        - uuid: "12345678-1234-1234-1234-00000000000B"
          write: true
          on_write:
            - logger.log: "Forcing NVS sync and Rebooting..."
            - lambda: 'global_preferences->sync();'
            - delay: 2s
            - button.press: restart_device

button:
  - platform: restart
    id: restart_device
    name: "Restart"
  - platform: template
    id: factory_reset
    name: "Factory Reset"
    on_press:
      - script.execute: do_factory_reset

binary_sensor:
  - platform: gpio
    pin: { number: 9, inverted: true }
    id: factory_reset_button
    filters: [delayed_on: 5s]
    on_press:
      then:
        - script.execute: do_factory_reset

switch:
  - platform: gpio
    pin: { number: 15, inverted: true }
    id: user_led
    internal: true
  - platform: template
    id: dummy_switch
    name: "Power"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

script:
  - id: run_pending_ota
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(g_ota_pending) && id(g_ota_url).length() > 0 && id(g_ota_md5).length() > 0;'
          then:
            - logger.log:
                format: "Applying OTA version %s from %s"
                args: ['id(g_ota_version).c_str()', 'id(g_ota_url).c_str()']
            - ota.http_request.flash:
                url: !lambda 'return id(g_ota_url);'
                md5: !lambda 'return id(g_ota_md5);'
  - id: do_factory_reset
    then:
      - logger.log: "Factory reset triggered! Clearing all provisioning data..."
      - globals.set: { id: g_user_id, value: '"provisioning"' }
      - globals.set: { id: g_home_id, value: '"unassigned"' }
      - globals.set: { id: g_device_id, value: '"unassigned"' }
      - globals.set: { id: g_mqtt_url, value: '"dummy.local"' }
      - globals.set: { id: g_mqtt_username, value: '""' }
      - globals.set: { id: g_mqtt_password, value: '""' }
      - globals.set: { id: g_mqtt_port, value: '"1883"' }
      - globals.set: { id: g_wifi_ssid, value: '""' }
      - globals.set: { id: g_wifi_password, value: '""' }
      - globals.set: { id: g_ota_url, value: '""' }
      - globals.set: { id: g_ota_md5, value: '""' }
      - globals.set: { id: g_ota_version, value: '""' }
      - globals.set: { id: g_ota_pending, value: 'false' }
      - globals.set: { id: g_ota_topic_subscribed, value: 'false' }
      - lambda: 'global_preferences->sync();'
      - delay: 1s
      - button.press: restart_device
  - id: blink_enrollment_led
    mode: restart
    then:
      - while:
          condition: { lambda: 'return true;' }
          then:
            - switch.toggle: user_led
            - delay: 500ms

preferences:
  flash_write_interval: 60s

wifi:
  ssid: "dummy"
  password: ""
  on_connect:
    - logger.log: "WiFi connected. Enabling MQTT."
    - delay: 2s
    - mqtt.enable:
