services:
  traefik:
    image: traefik:v3.4
    container_name: iot-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=${DNS_PROVIDER:-cloudflare}
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - 80:80
      - 443:443
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acmedata:/acme
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: iot-valkey
    labels:
      - traefik.enable=false
    volumes:
      - valkeydata:/data
    restart: unless-stopped

  kratos-migrate:
    image: oryd/kratos:v1.3
    container_name: iot-kratos-migrate
    command: migrate sql -e --yes
    environment:
      - DSN=${KRATOS_DSN}
    volumes:
      - ./ory/kratos/kratos.yml:/etc/config/kratos.yml:ro
      - ./ory/kratos/identity.schema.json:/etc/config/identity.schema.json:ro
    restart: "no"

  kratos:
    image: oryd/kratos:v1.3
    container_name: iot-kratos
    command: serve -c /etc/config/kratos.yml --dev
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.kratos.rule=Host(`${DOMAIN}`) && (PathPrefix(`/self-service/`) || PathPrefix(`/sessions/`) || PathPrefix(`/schemas/`))
      - traefik.http.routers.kratos.entrypoints=websecure
      - traefik.http.routers.kratos.tls.certresolver=letsencrypt
      - traefik.http.services.kratos.loadbalancer.server.port=4433
    environment:
      - DSN=${KRATOS_DSN}
      # Serve
      - SERVE_PUBLIC_BASE_URL=https://${DOMAIN}/
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS_0=https://${DOMAIN}
      # Selfservice URLs
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=https://${DOMAIN}/
      - SELFSERVICE_FLOWS_LOGIN_UI_URL=https://${DOMAIN}/login
      - SELFSERVICE_FLOWS_REGISTRATION_UI_URL=https://${DOMAIN}/registration
      - SELFSERVICE_FLOWS_VERIFICATION_UI_URL=https://${DOMAIN}/verification
      - SELFSERVICE_FLOWS_VERIFICATION_AFTER_DEFAULT_BROWSER_RETURN_URL=https://${DOMAIN}/
      - SELFSERVICE_FLOWS_SETTINGS_UI_URL=https://${DOMAIN}/settings
      - SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL=https://${DOMAIN}/
      # OIDC
      - SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_ID=${GOOGLEAUTH_CLIENT_ID:-}
      - SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_SECRET=${GOOGLEAUTH_CLIENT_SECRET:-}
      # Courier / SMTP
      - COURIER_SMTP_CONNECTION_URI=${SMTP_CONNECTION_URI:-smtp://localhost:587/}
      - COURIER_SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-noreply@example.com}
      - COURIER_SMTP_FROM_NAME=${SMTP_FROM_NAME:-IoT Platform}
    volumes:
      - ./ory/kratos/kratos.yml:/etc/config/kratos.yml:ro
      - ./ory/kratos/identity.schema.json:/etc/config/identity.schema.json:ro
      - ./ory/kratos/oidc.google.jsonnet:/etc/config/oidc.google.jsonnet:ro
      - ./ory/kratos/registration-hook.jsonnet:/etc/config/registration-hook.jsonnet:ro
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v2.3
    container_name: iot-hydra-migrate
    command: migrate sql -e --yes
    environment:
      - DSN=${HYDRA_DSN}
    volumes:
      - ./ory/hydra/hydra.yml:/etc/config/hydra.yml:ro
    restart: "no"

  hydra:
    image: oryd/hydra:v2.3
    container_name: iot-hydra
    command: serve all --config /etc/config/hydra.yml
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.hydra.rule=Host(`${DOMAIN}`) && (PathPrefix(`/oauth2/`) || PathPrefix(`/.well-known/`))
      - traefik.http.routers.hydra.entrypoints=websecure
      - traefik.http.routers.hydra.tls.certresolver=letsencrypt
      - traefik.http.services.hydra.loadbalancer.server.port=4444
    environment:
      - DSN=${HYDRA_DSN}
      - URLS_SELF_ISSUER=https://${DOMAIN}/
      - URLS_CONSENT=http://backend:${BACKEND_PORT:-8080}/oauth/consent
      - URLS_LOGIN=http://backend:${BACKEND_PORT:-8080}/oauth/login
      - URLS_LOGOUT=http://backend:${BACKEND_PORT:-8080}/oauth/logout
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS_0=https://${DOMAIN}
    volumes:
      - ./ory/hydra/hydra.yml:/etc/config/hydra.yml:ro
    restart: unless-stopped

  backend:
    build: .
    container_name: iot-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/oauth/`))
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=${BACKEND_PORT:-8080}
    volumes:
      - ./firmware:/app/firmware
    environment:
      - SERVER_PORT=${BACKEND_PORT:-8080}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USER=${DB_USER}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - DATABASE_NAME=${DB_NAME}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - FRONTEND_ALLOWED_ORIGINS=https://${DOMAIN}
      - VALKEY_ADDR=valkey:6379
      - FIRMWARE_STORAGE_DIR=/app/firmware
      - ORY_KRATOS_PUBLIC_URL=http://kratos:4433
      - ORY_KRATOS_ADMIN_URL=http://kratos:4434
      - ORY_HYDRA_PUBLIC_URL=http://hydra:4444
      - ORY_HYDRA_ADMIN_URL=http://hydra:4445
      - ORY_FRONTEND_URL=https://${DOMAIN}
    depends_on:
      - valkey
      - kratos
      - hydra
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: iot-firmware-caddy
    labels:
      - traefik.enable=true
      - traefik.http.routers.firmware.rule=Host(`${DOMAIN}`) && PathPrefix(`/firmware/`)
      - traefik.http.routers.firmware.entrypoints=websecure
      - traefik.http.routers.firmware.tls.certresolver=letsencrypt
      - traefik.http.services.firmware.loadbalancer.server.port=80
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./firmware:/srv/firmware:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./web
    container_name: iot-frontend
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    environment:
      - API_BASE_URL=https://${DOMAIN}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  valkeydata:
  acmedata:
